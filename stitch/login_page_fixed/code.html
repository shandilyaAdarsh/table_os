<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TableOS — SuperAdmin Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed": "#c0e8ff",
                    "on-error-container": "#ffdad6",
                    "on-secondary-fixed": "#1b1c1c",
                    "surface-bright": "#3a3939",
                    "surface": "#131313",
                    "inverse-primary": "#b72028",
                    "tertiary": "#83d0f6",
                    "surface-container-highest": "#353534",
                    "tertiary-fixed-dim": "#83d0f6",
                    "on-secondary-container": "#b6b5b4",
                    "secondary-fixed": "#e4e2e1",
                    "inverse-on-surface": "#313030",
                    "on-surface": "#e5e2e1",
                    "on-tertiary-fixed-variant": "#004d66",
                    "outline": "#aa8986",
                    "inverse-surface": "#e5e2e1",
                    "surface-dim": "#131313",
                    "surface-container-high": "#2a2a2a",
                    "surface-container": "#201f1f",
                    "secondary-fixed-dim": "#c8c6c5",
                    "on-primary-container": "#ffdad7",
                    "on-tertiary": "#003547",
                    "surface-container-lowest": "#0e0e0e",
                    "on-secondary": "#303030",
                    "on-error": "#690005",
                    "secondary-container": "#474746",
                    "surface-tint": "#ffb3ae",
                    "primary-fixed": "#ffdad7",
                    "surface-container-low": "#1c1b1b",
                    "on-tertiary-container": "#c1e9ff",
                    "on-secondary-fixed-variant": "#474746",
                    "outline-variant": "#5a403e",
                    "primary-fixed-dim": "#ffb3ae",
                    "primary-container": "#c0272d",
                    "on-primary": "#68000c",
                    "primary": "#ffb3ae",
                    "error": "#ffb4ab",
                    "tertiary-container": "#006d8f",
                    "background": "#131313",
                    "secondary": "#c8c6c5",
                    "on-primary-fixed-variant": "#930015",
                    "surface-variant": "#353534",
                    "on-surface-variant": "#e3bebb",
                    "on-primary-fixed": "#410004",
                    "error-container": "#93000a",
                    "on-background": "#e5e2e1",
                    "on-tertiary-fixed": "#001e2b"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"],
                    "mono": ["JetBrains Mono"]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #0D0D0D;
            background-image: radial-gradient(#1A1A1A 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .red-glow {
            background: radial-gradient(circle at top center, rgba(192, 39, 45, 0.05) 0%, transparent 70%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="min-h-screen text-on-surface selection:bg-primary-container selection:text-white flex overflow-hidden">
<!-- Subtle Background Elements -->
<div class="fixed inset-0 red-glow pointer-events-none"></div>
<!-- Main Layout Container -->
<main class="flex w-full h-screen">
<!-- Left Side: Editorial Branding (60%) -->
<section class="hidden lg:flex lg:w-3/5 flex-col justify-between p-20 relative z-10">
<div>
<!-- Editorial Typography Stack -->
<div class="space-y-0">
<h1 class="text-[96px] font-extrabold leading-[0.9] tracking-tighter text-[#F5F5F5] block">
                        Platform
                    </h1>
<h1 class="text-[96px] font-extrabold leading-[0.9] tracking-tighter text-[#F5F5F5] block">
                        Control
                    </h1>
<h1 class="text-[96px] font-extrabold leading-[0.9] tracking-tighter text-primary-container block">
                        Center
                    </h1>
</div>
<!-- Stat Pills -->
<div class="mt-12 flex gap-4">
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container-low border border-surface-container-high rounded-full">
<span class="font-mono text-sm font-bold text-[#F5F5F5]">12</span>
<span class="text-xs text-[#555555] uppercase tracking-wider font-medium">Restaurants</span>
</div>
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container-low border border-surface-container-high rounded-full">
<span class="font-mono text-sm font-bold text-[#F5F5F5]">₹1.2L</span>
<span class="text-xs text-[#555555] uppercase tracking-wider font-medium">MRR</span>
</div>
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container-low border border-surface-container-high rounded-full">
<span class="font-mono text-sm font-bold text-[#F5F5F5]">99.9%</span>
<span class="text-xs text-[#555555] uppercase tracking-wider font-medium">Uptime</span>
</div>
</div>
</div>
<!-- Bottom Left Footer Metadata -->
<div class="flex items-center gap-3">
<div class="w-1.5 h-1.5 bg-primary-container rounded-full animate-pulse"></div>
<p class="text-[11px] font-medium text-[#555555] uppercase tracking-[0.2em]">
                    TableOS SuperAdmin · Restricted Access
                </p>
</div>
</section>
<!-- Right Side: Login Terminal (40%) -->
<section class="w-full lg:w-2/5 flex flex-col justify-center items-center px-8 lg:px-20 relative bg-background/40 backdrop-blur-sm">
<div class="w-full max-w-md">
<!-- Login Card -->
<div class="bg-[#141414] border border-surface-container-high p-8 rounded-xl relative overflow-hidden">
<!-- Subtle Red Top Border Accent -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-primary-container"></div>
<!-- Header Info -->
<div class="flex flex-col items-start mb-10">
<div class="w-10 h-10 bg-primary-container rounded-full flex items-center justify-center mb-6 shadow-[0_0_20px_rgba(192,39,45,0.2)]">
<span class="font-bold text-white text-sm tracking-tighter">TS</span>
</div>
<h2 class="text-2xl font-bold text-[#F5F5F5] tracking-tight">Welcome back</h2>
<p class="text-xs font-semibold text-primary-container/80 uppercase tracking-widest mt-1">Superadmin access only</p>
</div>
<!-- Login Form -->
<form class="space-y-5" onsubmit="return false;">
<div class="space-y-2">
<label class="text-[10px] font-bold text-[#555555] uppercase tracking-widest block ml-1">Email Address</label>
<input class="w-full h-[44px] bg-surface-container-lowest border border-surface-container-high rounded-xl px-4 text-sm font-body text-on-surface placeholder:text-[#333333] focus:outline-none focus:ring-1 focus:ring-primary-container/50 transition-all" placeholder="admin@tableos.io" type="email"/>
</div>
<div class="space-y-2">
<label class="text-[10px] font-bold text-[#555555] uppercase tracking-widest block ml-1">Password</label>
<input class="w-full h-[44px] bg-surface-container-lowest border border-surface-container-high rounded-xl px-4 text-sm font-body text-on-surface placeholder:text-[#333333] focus:outline-none focus:ring-1 focus:ring-primary-container/50 transition-all" placeholder="••••••••••••" type="password"/>
</div>
<div class="pt-2 space-y-4">
<button class="w-full h-[44px] bg-primary-container hover:bg-primary-container/90 text-white font-bold text-sm rounded-xl transition-all active:scale-[0.98] shadow-lg shadow-primary-container/10">Access Terminal</button>
<p class="text-[11px] text-center text-[#888888]">Forgot password? Contact system administrator</p>
</div>
</form>
</div>
<!-- Login Footer -->
<div class="mt-8 text-center space-y-1">
<p class="text-[10px] font-bold text-[#555555] uppercase tracking-[0.25em]">
                        Protected by 2FA · TableOS Inc.
                    </p>
<div class="flex justify-center gap-4 pt-4">
<a class="text-[10px] font-semibold text-[#333333] hover:text-primary-container transition-colors uppercase tracking-widest" href="#">Privacy</a>
<a class="text-[10px] font-semibold text-[#333333] hover:text-primary-container transition-colors uppercase tracking-widest" href="#">Terms</a>
<a class="text-[10px] font-semibold text-[#333333] hover:text-primary-container transition-colors uppercase tracking-widest" href="#">System Status</a>
</div>
</div>
</div>
</section>
</main>
<!-- Overlay Grain Texture (Subtle) -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-overlay bg-[url('https://grainy-gradients.vercel.app/noise.svg')]"></div>
</body></html>
